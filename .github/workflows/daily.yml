name: collect-bestsellers

on:
  # 외부 스케줄러(cron-job.org)가 매일 06:00(KST)에 이 이벤트로 깨운다.
  repository_dispatch:
    types: [run-collect]
  workflow_dispatch:          # 수동 실행 버튼도 유지
  # ※ GitHub 자체 schedule 은 정시를 못 지켜서 제거함 → 외부 스케줄러로 대체

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install -r requirements.txt
      - run: python -m playwright install --with-deps chromium

      - name: Collect
        env:
          ALADIN_TTB_KEY: ${{ secrets.ALADIN_TTB_KEY }}
        run: python collect.py

      - name: Commit results
        run: |
          git config user.name  "bestseller-bot"
          git config user.email "bot@users.noreply.github.com"
          git add -A
          git commit -m "data: $(date -u +%F)" || echo "변경 없음"
          git push
