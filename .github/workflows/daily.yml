name: collect-bestsellers

on:
  schedule:
    # ── 중요: GitHub Actions cron 은 UTC 기준! (한국시간 = UTC + 9) ──
    # 하루 한 번, 한국 오전 06:00 에만 수집.
    #   한국 06:00  =  UTC 21:00(전날)  →  "0 21 * * *"
    - cron: "0 21 * * *"
  workflow_dispatch:        # 수동 실행 버튼은 유지

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install -r requirements.txt
      - run: python -m playwright install --with-deps chromium

      - name: Collect
        env:
          ALADIN_TTB_KEY: ${{ secrets.ALADIN_TTB_KEY }}
        run: python collect.py

      - name: Commit results
        run: |
          git config user.name  "bestseller-bot"
          git config user.email "bot@users.noreply.github.com"
          git add -A
          git commit -m "data: $(date -u +%F)" || echo "변경 없음"
          git push
